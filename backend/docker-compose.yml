services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: streetgolf
      POSTGRES_PASSWORD: streetgolf
      POSTGRES_DB: streetgolf
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streetgolf"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://streetgolf:streetgolf@db:5432/streetgolf
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
